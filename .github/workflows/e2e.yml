name: E2E Tests

permissions:
  contents: read

on:
  pull_request:
    paths:
      - "dapp/**"
      - ".github/workflows/e2e.yml"

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      # Default to a local Soroban quickstart in CI. This workflow will
      # start the docker-compose `testnet` service and deploy the contracts
      # to the local node. If you prefer the remote testnet, override these
      # environment variables in the workflow dispatch.
      PUBLIC_DELEGATION_API_URL: "https://ipfs-testnet.tansu.dev"
      PUBLIC_SOROBAN_RPC_URL: "http://localhost:8000/soroban/rpc"
      PUBLIC_SOROBAN_NETWORK_PASSPHRASE: "Standalone Network ; February 2017"
      PUBLIC_HORIZON_URL: "http://localhost:8000"
      PUBLIC_TANSU_CONTRACT_ID: "CTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTTT"
      PUBLIC_TANSU_OWNER_ID: "GAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWHF"
      CI: "true"

    defaults:
      run:
        working-directory: ./dapp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "latest"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Get Bun cache directory
        id: bun-cache-dir
        run: echo "dir=$(bun pm cache)" >> ${GITHUB_OUTPUT}

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.bun-cache-dir.outputs.dir }}
            ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock', '**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browsers & deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright deps (if cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Setup environment variables
        run: cp .env.example .env

      - name: Start local Soroban quickstart
        run: docker compose up -d testnet

      - name: Wait for Soroban RPC to become available
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/ >/dev/null 2>&1; then
              echo "Soroban RPC available" && exit 0
            fi
            sleep 1
          done
          echo "Timed out waiting for Soroban RPC" && exit 1

      - name: Install Rust and stellar-cli
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add wasm32v1-none
          cargo install --locked stellar-cli

      - name: Build and deploy contracts to local node
        run: |
          make contract_build
          make contract_bindings network=testnet-local
          make contract_deploy network=testnet-local

      - name: Build application
        run: bun run build

      - name: Run E2E tests
        run: bun run test
        env:
          DEBUG: pw:webserver

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: |
            ./dapp/test-results/
            ./dapp/playwright-report/
          retention-days: 7
