name: Cost Estimate Test

permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

on:
  pull_request:
    paths:
      - 'contracts/**'
      - '.github/workflows/cost-estimate.yml'
      - '.github/workflows/parse_costs.py'
  push:
    branches: [ main ]
    paths:
      - 'contracts/**'
      - '.github/workflows/cost-estimate.yml'
      - '.github/workflows/parse_costs.py'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  RUSTFLAGS: -C debuginfo=0
  RUST_BACKTRACE: 1
  CARGO_TERM_COLOR: always
  COST_THRESHOLD_PCT: "5.0"

jobs:
  cost-estimate:
    name: Cost Estimate Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          target: wasm32-unknown-unknown

      - name: Test cost budget enforcement logic
        run: python3 -m unittest test_parse_costs -v
        working-directory: .github/workflows

      - name: Download baseline costs from latest successful main run
        if: github.event_name == 'pull_request'
        id: baseline
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RUN_ID=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow cost-estimate.yml \
            --branch main --status success --limit 1 --json databaseId --jq '.[0].databaseId // empty')

          if [ -z "$RUN_ID" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No prior successful cost-estimate run on main yet; skipping baseline comparison."
            exit 0
          fi

          if gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" -n cost-baseline -D /tmp/cost-baseline; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "Latest successful main run has no cost-baseline artifact; skipping baseline comparison."
          fi

      - name: Run and parse cost estimate tests
        id: cost-test
        run: |
          echo "## Running Cost Estimate Tests" >> $GITHUB_STEP_SUMMARY

          set +e
          cd contracts/tansu
          OUTPUT=$(cargo test test_cost_ -- --show-output 2>&1)
          CARGO_EXIT_CODE=$?
          echo "$OUTPUT"

          BASELINE_ARGS=()
          if [ "${{ steps.baseline.outputs.found }}" == "true" ]; then
            BASELINE_ARGS+=(--baseline /tmp/cost-baseline/costs.json)
          fi

          echo "$OUTPUT" | python3 ../../.github/workflows/parse_costs.py \
            --threshold "$COST_THRESHOLD_PCT" \
            --write-costs /tmp/costs.json \
            "${BASELINE_ARGS[@]}" >> $GITHUB_STEP_SUMMARY
          PARSE_EXIT_CODE=$?
          set -e

          echo "cargo_exit_code=$CARGO_EXIT_CODE" >> "$GITHUB_OUTPUT"
          echo "parse_exit_code=$PARSE_EXIT_CODE" >> "$GITHUB_OUTPUT"

      - name: Upload costs as next baseline
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.cost-test.outputs.cargo_exit_code == '0'
        uses: actions/upload-artifact@v7
        with:
          name: cost-baseline
          path: /tmp/costs.json
          retention-days: 90

      - name: Final check
        if: always()
        run: |
          if [ "${CARGO_EXIT_CODE}" != "0" ]; then
            echo "❌ Cost estimate tests failed to run"
            exit 1
          fi
          if [ "${PARSE_EXIT_CODE}" != "0" ]; then
            echo "❌ Cost budget regression detected – see job summary for details"
            exit 1
          fi
          echo "✅ All tests passed"
        env:
          CARGO_EXIT_CODE: ${{ steps.cost-test.outputs.cargo_exit_code }}
          PARSE_EXIT_CODE: ${{ steps.cost-test.outputs.parse_exit_code }}
